name: Release Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
      - '[0-9]*'
  pull_request:
    branches:
      - master

jobs:
  build-configurator-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: apps/configurator
        run: npm install

      - name: Build Configurator (Windows)
        working-directory: apps/configurator
        run: npm run tauri -- build

      - name: Prepare Windows Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/release/*.exe" -Destination staging
          Copy-Item "target/release/bundle/nsis/*.exe" -Destination staging
          Copy-Item "target/release/bundle/msi/*.msi" -Destination staging

      - name: Upload Configurator Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: configurator-windows
          path: staging/*

  build-configurator-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev libusb-1.0-0-dev rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: apps/configurator
        run: npm install

      - name: Build Configurator (Linux)
        working-directory: apps/configurator
        # Explicitly request targets. Note: Flatpak requires extra setup/manifest usually not auto-generated by simple CLI flags without config.
        # We build AppImage, Deb, RPM here.
        run: npm run tauri -- build --bundles appimage,deb,rpm

      - name: Prepare Linux Artifacts
        run: |
          mkdir staging
          find target/release/bundle -name "*.AppImage" -exec cp {} staging/ \;
          find target/release/bundle -name "*.deb" -exec cp {} staging/ \;
          find target/release/bundle -name "*.rpm" -exec cp {} staging/ \;

      - name: Upload Configurator Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: configurator-linux
          path: staging/*

  release:
    needs: [build-configurator-windows, build-configurator-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master'
    permissions:
        contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Determine Release Type
        id: release_type
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "TAG_NAME=nightly" >> $GITHUB_ENV
            echo "RELEASE_NAME=Nightly Build" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.IS_PRERELEASE }}
          files: |
            artifacts/configurator-windows/*
            artifacts/configurator-linux/*
          generate_release_notes: true
