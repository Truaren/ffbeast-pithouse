name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-configurator:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev libusb-1.0-0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/configurator/src-tauri

      - name: Install dependencies
        working-directory: apps/configurator
        run: npm install

      - name: Lint frontend
        working-directory: apps/configurator
        run: npm run lint || true

      - name: Type check
        working-directory: apps/configurator
        run: npm run type-check || true

      - name: Build configurator
        working-directory: apps/configurator
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: configurator-linux
          path: |
            apps/configurator/src-tauri/target/release/bundle/deb/*.deb
            apps/configurator/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/configurator/src-tauri

      - name: Install dependencies
        working-directory: apps/configurator
        run: npm install

      - name: Build configurator
        working-directory: apps/configurator
        run: npm run tauri build

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: configurator-windows
          path: |
            apps/configurator/src-tauri/target/release/*.exe
            apps/configurator/src-tauri/target/release/bundle/nsis/*.exe
            apps/configurator/src-tauri/target/release/bundle/msi/*.msi
