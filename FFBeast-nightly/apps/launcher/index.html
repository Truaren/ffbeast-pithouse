<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SODevs Game Launcher</title>
</head>

<body>
    <div id="app">
        <div style="padding: 2rem; color: #333; font-family: sans-serif;">
            <h1>Loading SODevs Launcher...</h1>
            <p>If this screen persists, an error occurred.</p>
            <div id="error-log" style="color: red; margin-top: 1rem; white-space: pre-wrap;"></div>
        </div>
    </div>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const errDiv = document.getElementById('error-log');
            if (errDiv) {
                errDiv.textContent += `Error: ${msg}\nAt: ${url}:${line}:${col}\n\n`;
            }
            alert(`Critical Error:\n${msg}`);
        };
        window.onunhandledrejection = function (event) {
            const errDiv = document.getElementById('error-log');
            if (errDiv) {
                errDiv.textContent += `Promise Rejection: ${event.reason}\n\n`;
            }
        };
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
